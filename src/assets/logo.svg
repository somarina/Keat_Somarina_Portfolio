<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a103c" />
      <stop offset="100%" stop-color="#050816" />
    </linearGradient>
    
    <!-- Accent Gradient for Logo Marks -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#915EFF" />
      <stop offset="50%" stop-color="#80b3ff" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Glow Hexagon Border -->
  <polygon points="100,20 170,60 170,140 100,180 30,140 30,60" 
           fill="url(#bgGrad)" 
           stroke="url(#accentGrad)" 
           stroke-width="6" 
           stroke-linejoin="round"
           filter="url(#glow)" />

  <!-- Inner Decorative Elements -->
  <polygon points="100,28 162,64 162,136 100,172 38,136 38,64" 
           fill="none" 
           stroke="url(#accentGrad)" 
           stroke-width="1.5" 
           stroke-opacity="0.5" 
           stroke-linejoin="round" />

  <!-- Sleek Stylized "K" -->
  <path d="M 68 65 L 68 135 M 68 100 L 98 65 M 82 84 L 100 135" 
        stroke="white" 
        stroke-width="10" 
        stroke-linecap="round" 
        stroke-linejoin="round" />

  <!-- Sleek Stylized "S" -->
  <path d="M 134 72 C 122 66, 110 74, 112 85 C 114 96, 134 94, 134 107 C 134 118, 122 134, 108 126" 
        fill="none"
        stroke="url(#accentGrad)" 
        stroke-width="10" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
</svg>